name: wird
description: A focused, step-by-step app for reciting classical wirds and dua collections.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^17.2.3

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

  # Misc
  google_fonts: ^8.1.0
  uuid: ^4.5.3
  intl: ^0.20.2
  wakelock_plus: ^1.6.1
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  hive_ce_generator: ^1.11.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/covers/
